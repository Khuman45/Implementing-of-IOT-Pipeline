<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CollabX — Register</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="auth-body">
<div class="auth-card">
 <div class="auth-logo">CollabX</div>
 <div class="auth-subtitle">Research · Development · Innovation</div>
 <h2>Create account</h2>
 {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
 <form method="POST" action="/register">
 <div class="form-group"><label class="form-label">Full name</label><input type="text" name="name" placeholder="Your full name" required></div>
 <div class="form-group"><label class="form-label">Email address</label><input type="email" name="email" placeholder="you@example.com" required></div>
 <div class="form-group"><label class="form-label">Phone number</label><input type="text" name="phone" placeholder="+1 234 567 8900"></div>
 <div class="form-group"><label class="form-label">Password <span style="color:var(--text3);font-size:12px;">(min. 6 characters)</span></label><input type="password" name="password" placeholder="••••••••" required></div>
 <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Create Account &rarr;</button>
 </form>
 <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text3);">Already registered? <a href="/" style="color:var(--accent2);">Sign in</a></p>
 <div class="alert alert-info" style="margin-top:16px;font-size:13px;">ℹ Your account will require admin approval before you can sign in.</div>
</div></body></html>
